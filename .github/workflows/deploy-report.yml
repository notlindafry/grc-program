name: Deploy report

# Regenerate the sample report from the corpus and publish the rendered HTML to
# Vercel, so the live page never drifts from the committed data. The report is
# rendered here (Python runs on the runner) and shipped to Vercel as a prebuilt
# static page -- Vercel only serves it, it does not build anything.
#
# WARNING: this publishes whatever is in ./data to a PUBLIC URL on every push to
# main. Do not commit sensitive or real risk data unless the deployment is meant
# to be public. Protect `main` (require PR review) so nothing publishes unseen.
#
# Secrets required (repo Settings -> Secrets and variables -> Actions):
# VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "risk_ledger/**"
      - "examples/generate_ecosystem.py"
      - "docs/dashboard.html"
      - ".github/workflows/deploy-report.yml"
  workflow_dispatch:

concurrency:
  group: deploy-report
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Regenerate the corpus (validates it builds)
        run: python examples/generate_ecosystem.py

      - name: Assemble static site
        run: |
          mkdir -p public
          # Render the dashboard fresh from the corpus + code so the live page can
          # never drift from what is committed. Pinned to the canonical reference
          # date the corpus stories are written against (docs/corpus-stories.md);
          # the synthetic corpus lives in a 2026 window, so staleness/expiry math
          # must run as-of that date, not the runner's wall clock.
          python -m risk_ledger.cli --as-of 2026-06-18 dashboard --out public/index.html
          # The page is served on a public URL -- keep crawlers out entirely.
          printf 'User-agent: *\nDisallow: /\n' > public/robots.txt

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install --global vercel@latest
          vercel deploy public --prod --yes --token="$VERCEL_TOKEN"
